<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#003f7f">
    State Diagram — Order Object
  </text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#5a6478">
    CS3365 — Team 9 — Phase 2 — Lifecycle of a single Order from purchase to claim
  </text>

  <!-- Initial state (filled black circle) -->
  <circle cx="120" cy="130" r="12" fill="#1a1a2e"/>

  <!-- Created -->
  <g>
    <rect x="240" y="100" width="180" height="60" rx="14" fill="#e3f2fd" stroke="#003f7f" stroke-width="2"/>
    <text x="330" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#003f7f">Created</text>
    <text x="330" y="145" text-anchor="middle" font-size="11" fill="#5a6478">entry / generate orderId</text>
  </g>

  <!-- Validating -->
  <g>
    <rect x="500" y="100" width="180" height="80" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
    <text x="590" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef6c00">Validating</text>
    <text x="590" y="142" text-anchor="middle" font-size="11" fill="#5a6478">do / verify 1 ≤ qty ≤ 10</text>
    <text x="590" y="158" text-anchor="middle" font-size="11" fill="#5a6478">do / validate numbers</text>
    <text x="590" y="174" text-anchor="middle" font-size="11" fill="#5a6478">do / check payment</text>
  </g>

  <!-- Payment Processing -->
  <g>
    <rect x="780" y="100" width="200" height="80" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
    <text x="880" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef6c00">PaymentProcessing</text>
    <text x="880" y="142" text-anchor="middle" font-size="11" fill="#5a6478">entry / charge customer</text>
    <text x="880" y="158" text-anchor="middle" font-size="11" fill="#5a6478">do / await confirmation</text>
    <text x="880" y="174" text-anchor="middle" font-size="11" fill="#5a6478">exit / log transaction</text>
  </g>

  <!-- PendingDraw -->
  <g>
    <rect x="430" y="270" width="240" height="100" rx="14" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
    <text x="550" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#0277bd">PendingDraw</text>
    <text x="550" y="316" text-anchor="middle" font-size="11" fill="#5a6478">entry / set status = pending_draw</text>
    <text x="550" y="332" text-anchor="middle" font-size="11" fill="#5a6478">do / show on order history</text>
    <text x="550" y="348" text-anchor="middle" font-size="11" fill="#5a6478">do / wait for next draw</text>
    <text x="550" y="364" text-anchor="middle" font-size="11" fill="#5a6478">exit / fetch winning numbers</text>
  </g>

  <!-- Evaluating (composite state would be ideal; we keep as sequential) -->
  <g>
    <rect x="430" y="430" width="240" height="80" rx="14" fill="#fff8e1" stroke="#d99a0d" stroke-width="2"/>
    <text x="550" y="455" text-anchor="middle" font-size="14" font-weight="bold" fill="#d99a0d">Evaluating</text>
    <text x="550" y="474" text-anchor="middle" font-size="11" fill="#5a6478">do / for each ticket: countMatches()</text>
    <text x="550" y="490" text-anchor="middle" font-size="11" fill="#5a6478">do / compute totalWinnings</text>
    <text x="550" y="506" text-anchor="middle" font-size="11" fill="#5a6478">exit / notify by email if winner</text>
  </g>

  <!-- Winner -->
  <g>
    <rect x="120" y="570" width="200" height="80" rx="14" fill="#fff3cd" stroke="#d99a0d" stroke-width="3"/>
    <text x="220" y="595" text-anchor="middle" font-size="14" font-weight="bold" fill="#d99a0d">★ Winner</text>
    <text x="220" y="615" text-anchor="middle" font-size="11" fill="#5a6478">entry / display badge</text>
    <text x="220" y="631" text-anchor="middle" font-size="11" fill="#5a6478">entry / send win email</text>
    <text x="220" y="647" text-anchor="middle" font-size="11" fill="#5a6478">do / await claim action</text>
  </g>

  <!-- NoWin -->
  <g>
    <rect x="780" y="570" width="200" height="60" rx="14" fill="#f5f5f5" stroke="#5a6478" stroke-width="2"/>
    <text x="880" y="595" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a6478">NoWin</text>
    <text x="880" y="615" text-anchor="middle" font-size="11" fill="#5a6478">entry / status = no_win</text>
  </g>

  <!-- ClaimedOnline -->
  <g>
    <rect x="40" y="700" width="220" height="60" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="150" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">ClaimedOnline</text>
    <text x="150" y="745" text-anchor="middle" font-size="11" fill="#5a6478">entry / deposit to wallet</text>
  </g>

  <!-- ClaimingCenter -->
  <g>
    <rect x="290" y="700" width="240" height="60" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="410" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">AwaitingCenterClaim</text>
    <text x="410" y="745" text-anchor="middle" font-size="11" fill="#5a6478">do / await in-person verification</text>
  </g>

  <!-- Final state -->
  <g>
    <circle cx="950" cy="730" r="14" fill="white" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="950" cy="730" r="8" fill="#1a1a2e"/>
  </g>

  <!-- ============ Transitions ============ -->

  <!-- initial -> Created -->
  <line x1="132" y1="130" x2="240" y2="130" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="148" y="122" font-size="11" fill="#1a1a2e">customer clicks Buy</text>

  <!-- Created -> Validating -->
  <line x1="420" y1="130" x2="500" y2="130" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="122" font-size="11" fill="#1a1a2e">submit</text>

  <!-- Validating -> PaymentProcessing  [valid] -->
  <line x1="680" y1="140" x2="780" y2="140" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="690" y="132" font-size="11" fill="#1a1a2e">[valid input]</text>

  <!-- Validating -> Created (back) on invalid -->
  <path d="M 590 180 Q 460 230 330 160" fill="none" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="220" font-size="11" fill="#c62828">[invalid] / show error</text>

  <!-- PaymentProcessing -> PendingDraw -->
  <path d="M 880 180 Q 880 280 670 320" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="800" y="240" font-size="11" fill="#1a1a2e">payment confirmed /</text>
  <text x="800" y="254" font-size="11" fill="#1a1a2e">generate confirmation #</text>

  <!-- PaymentProcessing -> Created (failure) -->
  <path d="M 880 100 Q 880 50 330 100" fill="none" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="62" font-size="11" fill="#c62828">payment failed</text>

  <!-- PendingDraw -> Evaluating -->
  <line x1="550" y1="370" x2="550" y2="430" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="405" font-size="11" fill="#1a1a2e">drawDate reached / draw run by admin</text>

  <!-- Evaluating -> Winner -->
  <path d="M 470 510 Q 350 540 250 570" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="545" font-size="11" fill="#1a1a2e">[matches ≥ 2]</text>

  <!-- Evaluating -> NoWin -->
  <path d="M 660 480 Q 760 510 800 570" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="525" font-size="11" fill="#1a1a2e">[matches &lt; 2]</text>

  <!-- Winner -> ClaimedOnline -->
  <line x1="180" y1="650" x2="150" y2="700" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="40" y="685" font-size="11" fill="#1a1a2e">claimOnline()</text>
  <text x="40" y="699" font-size="11" fill="#5a6478">[winnings &lt; $600]</text>

  <!-- Winner -> AwaitingCenterClaim -->
  <line x1="280" y1="650" x2="380" y2="700" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="685" font-size="11" fill="#1a1a2e">[winnings ≥ $600]</text>

  <!-- ClaimedOnline -> Final -->
  <path d="M 260 730 Q 600 770 936 730" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AwaitingCenterClaim -> Final -->
  <line x1="530" y1="730" x2="936" y2="730" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NoWin -> Final -->
  <path d="M 880 630 Q 920 680 950 716" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Self loop on PendingDraw (next week passes without draw event) -->
  <path d="M 430 320 Q 380 320 380 350 Q 380 380 430 360" fill="none" stroke="#5a6478" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="290" y="345" font-size="10" fill="#5a6478">refresh / re-show</text>

  <!-- Legend -->
  <g transform="translate(40, 770)">
    <text x="0" y="0" font-size="11" fill="#5a6478" font-style="italic">
      Notation: ● initial state &#160; ◉ final state &#160; rounded rect = state &#160; arrow = transition (event [guard] / action) &#160; dashed = self-loop
    </text>
  </g>
</svg>
