{% extends "base.html" %}
{% block title %}Login &middot; Texas LPS{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card">
    <div class="logo-large">★</div>
    <h1>Texas LPS</h1>
    <p class="subtitle">Lottery Purchase System</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-block">Log In</button>
    </form>

    <p class="switch-link">
      Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
    <p class="switch-link" style="font-size: 0.85rem; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
      <strong>Demo admin:</strong> admin@lps.gov / admin123
    </p>
  </div>
</div>
{% endblock %}
