<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#003f7f">
    State Diagram — Ticket Object
  </text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#5a6478">
    CS3365 — Team 9 — Phase 2 — Lifecycle of a Ticket from creation to retirement
  </text>

  <!-- Initial state -->
  <circle cx="100" cy="180" r="12" fill="#1a1a2e"/>

  <!-- Draft (admin building it) -->
  <g>
    <rect x="200" y="150" width="200" height="80" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
    <text x="300" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef6c00">Draft</text>
    <text x="300" y="194" text-anchor="middle" font-size="11" fill="#5a6478">entry / generate ticketId</text>
    <text x="300" y="210" text-anchor="middle" font-size="11" fill="#5a6478">do / admin sets price &amp; prize</text>
    <text x="300" y="226" text-anchor="middle" font-size="11" fill="#5a6478">do / active = false</text>
  </g>

  <!-- Active (selling) -->
  <g>
    <rect x="475" y="150" width="220" height="100" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
    <text x="585" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Active</text>
    <text x="585" y="194" text-anchor="middle" font-size="11" fill="#5a6478">entry / active = true</text>
    <text x="585" y="210" text-anchor="middle" font-size="11" fill="#5a6478">do / appear on browse page</text>
    <text x="585" y="226" text-anchor="middle" font-size="11" fill="#5a6478">do / accept purchases</text>
    <text x="585" y="242" text-anchor="middle" font-size="11" fill="#5a6478">on price/prize update / save</text>
  </g>

  <!-- DrawScheduled -->
  <g>
    <rect x="775" y="100" width="220" height="80" rx="14" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
    <text x="885" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#0277bd">DrawScheduled</text>
    <text x="885" y="144" text-anchor="middle" font-size="11" fill="#5a6478">entry / set drawDate</text>
    <text x="885" y="160" text-anchor="middle" font-size="11" fill="#5a6478">do / countdown to draw</text>
    <text x="885" y="176" text-anchor="middle" font-size="11" fill="#5a6478">exit / lock new purchases</text>
  </g>

  <!-- Drawing -->
  <g>
    <rect x="775" y="230" width="220" height="80" rx="14" fill="#fff8e1" stroke="#d99a0d" stroke-width="2"/>
    <text x="885" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#d99a0d">Drawing</text>
    <text x="885" y="274" text-anchor="middle" font-size="11" fill="#5a6478">entry / generate 5 numbers</text>
    <text x="885" y="290" text-anchor="middle" font-size="11" fill="#5a6478">do / save to draws table</text>
    <text x="885" y="306" text-anchor="middle" font-size="11" fill="#5a6478">exit / publish results</text>
  </g>

  <!-- Suspended (admin temporarily disabled) -->
  <g>
    <rect x="475" y="380" width="220" height="80" rx="14" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
    <text x="585" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Suspended</text>
    <text x="585" y="424" text-anchor="middle" font-size="11" fill="#5a6478">entry / active = false</text>
    <text x="585" y="440" text-anchor="middle" font-size="11" fill="#5a6478">do / hide from browse</text>
    <text x="585" y="456" text-anchor="middle" font-size="11" fill="#5a6478">do / existing orders unaffected</text>
  </g>

  <!-- Retired -->
  <g>
    <rect x="200" y="500" width="240" height="80" rx="14" fill="#f5f5f5" stroke="#5a6478" stroke-width="2"/>
    <text x="320" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a6478">Retired</text>
    <text x="320" y="544" text-anchor="middle" font-size="11" fill="#5a6478">entry / active = false (perm.)</text>
    <text x="320" y="560" text-anchor="middle" font-size="11" fill="#5a6478">do / preserve historical orders</text>
    <text x="320" y="576" text-anchor="middle" font-size="11" fill="#5a6478">do / archive past draws</text>
  </g>

  <!-- Final state -->
  <g>
    <circle cx="120" cy="540" r="14" fill="white" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="120" cy="540" r="8" fill="#1a1a2e"/>
  </g>

  <!-- ============ Transitions ============ -->

  <!-- initial -> Draft -->
  <line x1="112" y1="180" x2="200" y2="180" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="172" font-size="11" fill="#1a1a2e">admin: addTicket()</text>

  <!-- Draft -> Active -->
  <line x1="400" y1="190" x2="475" y2="190" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="403" y="182" font-size="11" fill="#1a1a2e">save / publish</text>

  <!-- Active -> DrawScheduled -->
  <path d="M 695 180 Q 730 130 775 130" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="125" font-size="11" fill="#1a1a2e">weekly cycle starts</text>

  <!-- DrawScheduled -> Drawing -->
  <line x1="885" y1="180" x2="885" y2="230" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="895" y="210" font-size="11" fill="#1a1a2e">drawDate reached</text>

  <!-- Drawing -> Active (back for next week) -->
  <path d="M 775 270 Q 720 270 695 220" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="710" y="290" font-size="11" fill="#1a1a2e">draw complete /</text>
  <text x="710" y="305" font-size="11" fill="#1a1a2e">notify winners</text>

  <!-- Active -> Suspended -->
  <path d="M 560 250 Q 540 320 565 380" fill="none" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="320" font-size="11" fill="#c62828">admin: deactivate()</text>

  <!-- Suspended -> Active -->
  <path d="M 620 380 Q 660 320 640 250" fill="none" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="320" font-size="11" fill="#2e7d32">admin: reactivate()</text>

  <!-- Active -> Retired (admin permanently removes) -->
  <path d="M 475 250 Q 380 380 320 500" fill="none" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="370" font-size="11" fill="#1a1a2e">admin: removeTicket()</text>

  <!-- Suspended -> Retired -->
  <line x1="500" y1="460" x2="380" y2="500" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="370" y="490" font-size="11" fill="#1a1a2e">admin: removeTicket()</text>

  <!-- Retired -> Final -->
  <line x1="200" y1="540" x2="134" y2="540" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Self-loop on Active for editing price/prize -->
  <path d="M 475 220 Q 425 240 425 200 Q 425 170 475 195" fill="none" stroke="#5a6478" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="345" y="205" font-size="10" fill="#5a6478">edit price/prize</text>

  <!-- Legend -->
  <g transform="translate(40, 660)">
    <text x="0" y="0" font-size="11" fill="#5a6478" font-style="italic">
      Notation: ● initial state &#160; ◉ final state &#160; rounded rect = state &#160; arrow = transition (event [guard] / action) &#160; dashed = self-loop
    </text>
    <text x="0" y="18" font-size="11" fill="#5a6478" font-style="italic">
      Active is shown with a thicker border because it is the dominant state — most tickets remain Active for their entire commercial life.
    </text>
  </g>
</svg>
